spring:
  application:
    name: drinkgo
  datasource:
    url: jdbc:mysql://localhost:3306/drinkgo
    username: root
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379


server:
  port: 8080
  servlet:
      context-path: /api/v1

cloudinary:
  cloud_name: ${CLOUD_NAME}
  api_key: ${API_KEY}
  api_secret: ${API_SECRET}

secretkey: ${SECRETKEY}
