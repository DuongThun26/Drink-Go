spring:
  application:
    name: drinkgo
  datasource:
    url: jdbc:mysql://localhost:3306/drinkgo
    username: root
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


server:
  port: 8080
  servlet:
      context-path: /api/v1


secretkey: ${SECRETKEY}